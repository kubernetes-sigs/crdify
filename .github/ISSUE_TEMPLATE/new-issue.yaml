name: Bug Report
description: Report a bug you encounter while using Crdify
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Please provide as much info as possible.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it (as minimally and precisely as possible)?
    validations:
      required: true

  - type: textarea
    id: crdifyVersion
    attributes:
      label: crdify version
      value: |
        ```console
        $ crdify version
        # Run `crdify version` and paste output here
        ```
    validations:
      required: true
